<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giải thích chi tiết Module Orders</title>
  <style>
/* ═══════════════════════════════════════════
   VSCode Dark Theme — NestJS Doc Renderer
   ═══════════════════════════════════════════ */
:root {
  --bg:            #1e1e1e;
  --bg-sidebar:    #252526;
  --bg-surface:    #2d2d30;
  --bg-surface2:   #3c3c3c;
  --bg-hover:      #2a2d2e;
  --bg-active:     #37373d;
  --border:        #404040;
  --border-light:  #3c3c3c;
  --text:          #d4d4d4;
  --text-muted:    #858585;
  --text-bright:   #ffffff;
  --text-dim:      #6a6a6a;
  --kw:   #569cd6;
  --fn:   #dcdcaa;
  --str:  #ce9178;
  --typ:  #4ec9b0;
  --cmt:  #6a9955;
  --num:  #b5cea8;
  --dec:  #c586c0;
  --prop: #9cdcfe;
  --op:   #d4d4d4;
  --accent:  #007acc;
  --green:   #4ec9b0;
  --yellow:  #dcdcaa;
  --orange:  #ce9178;
  --red:     #f44747;
  --purple:  #c586c0;
  --node-guard:       #1a3a52;
  --node-guard-b:     #007acc;
  --node-pipe:        #1a3a28;
  --node-pipe-b:      #4ec9b0;
  --node-ctrl:        #2d2516;
  --node-ctrl-b:      #dcdcaa;
  --node-svc:         #2d1e35;
  --node-svc-b:       #c586c0;
  --node-db:          #1a2535;
  --node-db-b:        #569cd6;
  --node-cache:       #1a2a1a;
  --node-cache-b:     #4ec9b0;
  --node-err:         #3a1a1a;
  --node-err-b:       #f44747;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: sans-serif; font-size: 14px; line-height: 1.7; overflow-x: hidden; }
.page-wrap { display: flex; min-height: 100vh; }
.sidebar { width: 260px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 16px 0; }
.sidebar-title { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); padding: 0 16px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.toc-item { display: block; padding: 5px 16px; font-size: 12.5px; color: var(--text-muted); text-decoration: none; border-left: 2px solid transparent; transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toc-item:hover { background: var(--bg-hover); color: var(--text); }
.toc-item.active { border-left-color: var(--accent); color: var(--text-bright); background: var(--bg-active); }
.content { flex: 1; max-width: 960px; padding: 48px 52px 100px; min-width: 0; }
h1,h2,h3 { color: var(--text-bright); font-weight: 600; margin: 2.2em 0 0.6em; }
code { font-family: monospace; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: .15em .45em; color: var(--prop); }
.lifecycle-container { display: flex; flex-direction: column; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; margin: 2em 0; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24); }
@media (min-width: 992px) { .lifecycle-container { flex-direction: row; height: 520px; } }
.lc-flow-panel { flex: 1.3; padding: 24px; overflow: auto; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
@media (min-width: 992px) { .lc-flow-panel { border-bottom: none; border-right: 1px solid var(--border); } }
.lc-flow-scroll { flex: 1; display: flex; align-items: center; overflow-x: auto; padding: 20px 0; }
.lc-flow { display: flex; align-items: center; min-width: max-content; margin: auto; }
.lc-step { display: flex; flex-direction: column; align-items: center; position: relative; }
.lc-node { border-radius: 8px; padding: 14px 18px; min-width: 140px; text-align: center; border: 1px solid; cursor: pointer; }
.lc-node.guard  { background: var(--node-guard);  border-color: var(--node-guard-b); }
.lc-node.pipe   { background: var(--node-pipe);   border-color: var(--node-pipe-b); }
.lc-node.ctrl   { background: var(--node-ctrl);   border-color: var(--node-ctrl-b); }
.lc-node.svc    { background: var(--node-svc);    border-color: var(--node-svc-b); }
.lc-node.db     { background: var(--node-db);     border-color: var(--node-db-b); }
.lc-node.client { background: var(--bg-surface2); border-color: var(--border); }
.lc-node-label  { font-size: 12px; font-weight: 600; color: var(--text-bright); }
.lc-connector { display: flex; align-items: center; padding: 0 4px; }
.lc-line { height: 2px; width: 40px; background: var(--accent); }
.lc-arrow { border-left: 6px solid var(--accent); border-top: 5px solid transparent; border-bottom: 5px solid transparent; }
.lc-detail-panel { flex: 1; padding: 24px; overflow-y: auto; }
.lc-detail-empty { color: var(--text-muted); text-align: center; margin-top: 100px; }
.dec-card { display: flex; gap: 12px; background: var(--bg-surface2); border-left: 3px solid var(--dec); padding: 12px 16px; margin: 10px 0; }
.dec-card-name { color: var(--dec); font-weight: 600; }
.crud-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; margin: 12px 0; overflow: hidden; }
.crud-header { display: flex; gap: 12px; padding: 10px 16px; background: var(--bg-surface2); }
.crud-method { font-weight: 700; color: #89d185; }
.crud-body { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-title">Mục lục</div>
    </nav>
    <main class="content">
      <h1>Giải thích chi tiết Module Orders</h1>
      
      <div id="lifecycle-container" class="lifecycle-container">
          <div class="lc-flow-panel">
            <div class="lifecycle-title">Request Lifecycle — POST /orders/checkout</div>
            <div class="lc-flow-scroll">
              <div class="lc-flow">
                <div class="lc-step"><div class="lc-node client" data-node-name="Client"><div class="lc-node-label">Client</div></div></div>
                <div class="lc-connector"><div class="lc-line"></div><div class="lc-arrow"></div></div>
                <div class="lc-step"><div class="lc-node guard" data-node-name="AuthGuard"><div class="lc-node-label">AuthGuard</div></div></div>
              </div>
            </div>
          </div>
          <div class="lc-detail-panel">
            <div class="lc-detail-empty">Click node để xem chi tiết.</div>
          </div>
      </div>

      <div class="dec-card">
        <div class="dec-card-name">@UseGuards(AuthGuard)</div>
        <div class="dec-card-body">Bảo vệ route khỏi truy cập trái phép.</div>
      </div>

      <div class="crud-card">
        <div class="crud-header"><span class="crud-method">POST</span> <span>/orders/checkout</span></div>
        <div class="crud-body">
            <div>Input: CheckoutDto</div>
            <div>Logic: Transaction</div>
            <div>Output: OrderResponse</div>
        </div>
      </div>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const toc = document.getElementById('sidebar');
        document.querySelectorAll('h1, h2').forEach(h => {
            if(!h.id) h.id = h.innerText.toLowerCase().replace(/ /g, '-');
            const a = document.createElement('a');
            a.className = 'toc-item'; a.href = '#' + h.id; a.innerText = h.innerText;
            toc.appendChild(a);
        });
        document.querySelectorAll('.lc-node').forEach(node => {
            node.addEventListener('click', () => {
                document.querySelector('.lc-detail-empty').style.display = 'none';
                document.querySelector('.lc-detail-panel').innerHTML = '<div style="color:white">' + node.dataset.nodeName + '</div>';
            });
        });
    });
  </script>
</body>
</html>
