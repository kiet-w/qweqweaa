<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giải Thích Chuyên Sâu - Module Cart</title>
  <style>
/* === VSCode Dark Theme - NestJS Doc Renderer === */
:root {
  --bg: #1e1e1e; --bg-sidebar: #252526; --bg-surface: #2d2d30; --bg-surface2: #3c3c3c;
  --bg-hover: #2a2d2e; --bg-active: #37373d; --border: #404040; --border-light: #3c3c3c;
  --text: #d4d4d4; --text-muted: #858585; --text-bright: #ffffff; --text-dim: #6a6a6a;
  --kw: #569cd6; --fn: #dcdcaa; --str: #ce9178; --typ: #4ec9b0; --cmt: #6a9955;
  --num: #b5cea8; --dec: #c586c0; --prop: #9cdcfe; --accent: #007acc; --green: #4ec9b0;
  --yellow: #dcdcaa; --orange: #ce9178; --red: #f44747; --purple: #c586c0;
  --node-guard: #1a3a52; --node-guard-b: #007acc; --node-pipe: #1a3a28; --node-pipe-b: #4ec9b0;
  --node-ctrl: #2d2516; --node-ctrl-b: #dcdcaa; --node-svc: #2d1e35; --node-svc-b: #c586c0;
  --node-db: #1a2535; --node-db-b: #569cd6; --node-cache: #1a2a1a; --node-cache-b: #4ec9b0;
  --node-err: #3a1a1a; --node-err-b: #f44747;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.7; }
.page-wrap { display: flex; min-height: 100vh; }
.sidebar { width: 260px; flex-shrink: 0; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 16px 0; }
.content { flex: 1; max-width: 960px; padding: 48px 52px 100px; }
h1, h2, h3 { color: var(--text-bright); margin: 2em 0 0.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
h1 { font-size: 1.9em; } h2 { font-size: 1.45em; } h3 { font-size: 1.2em; color: var(--yellow); }
code { font-family: monospace; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 4px; padding: .15em .45em; color: var(--prop); }
pre { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; margin: 1.2em 0; overflow: hidden; }
pre code { display: block; padding: 18px 20px; color: var(--text); overflow-x: auto; }
.pre-header { background: var(--bg-surface2); padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; }
.pre-filename { color: var(--yellow); font-family: monospace; }
/* Lifecycle Container Component Styles */
.lifecycle-container { display: flex; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; margin: 2em 0; overflow: hidden; }
.lc-flow-panel { flex: 1; padding: 24px; border-right: 1px solid var(--border); }
.lifecycle-title { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 24px; font-weight: 700; }
.lc-node { border-radius: 8px; padding: 14px; border: 1px solid; text-align: center; }
.lc-node.guard { background: var(--node-guard); border-color: var(--node-guard-b); }
.lc-node.ctrl { background: var(--node-ctrl); border-color: var(--node-ctrl-b); }
.lc-node.svc { background: var(--node-svc); border-color: var(--node-svc-b); }
.lc-node-label { font-size: 12px; font-weight: 600; color: var(--text-bright); }

/* CRUD Card Component Styles */
.crud-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; margin: 12px 0; }
.crud-header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg-surface2); border-bottom: 1px solid var(--border); }
.crud-method { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; font-family: monospace; }
.method-get { background: #1a3a28; color: #4ec9b0; }
.crud-body { padding: 14px 16px; }

/* Decorator Card Component Styles */
.dec-card { display: flex; gap: 12px; align-items: flex-start; background: var(--bg-surface2); border: 1px solid var(--border); border-left: 3px solid var(--dec); border-radius: 6px; padding: 12px; margin: 10px 0; font-size: 13px; }
.dec-card-name { font-family: monospace; font-weight: 600; color: var(--dec); min-width: 130px; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <nav class="sidebar">
      <div style="padding: 16px; font-weight: bold;">TOC</div>
      <a href="#cart-module" class="toc-item">Module Cart</a>
    </nav>
    <main class="content">
      <h1 id="cart-module">Giải Thích Chuyên Sâu - Module Cart (src/cart)</h1>
      <p>Module <code>cart</code> là trái tim của hệ thống thương mại điện tử...</p>

      <h2>Request Lifecycle</h2>
      <div class="lifecycle-container">
        <div class="lc-flow-panel">
          <div class="lifecycle-title">Request Lifecycle - GET /cart</div>
          <div class="lc-node guard">
            <div class="lc-node-label">AuthGuard</div>
          </div>
        </div>
      </div>

      <h2>CRUD Operations</h2>
      <div class="crud-card">
        <div class="crud-header">
          <span class="crud-method method-get">GET</span>
          <span class="crud-path">/cart</span>
        </div>
        <div class="crud-body">Endpoint lấy giỏ hàng</div>
      </div>

      <h2>Decorators</h2>
      <div class="dec-card">
        <div class="dec-card-name">@Controller('cart')</div>
        <div class="dec-card-body">Khai báo CartController</div>
      </div>
    </main>
  </div>
</body>
</html>
